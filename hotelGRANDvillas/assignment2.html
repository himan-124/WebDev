<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Villas | Room Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #536fca;
            --primary-hover: #315ec0;
            --accent: #2d400b;
            --bg-gradient: linear-gradient(135deg, #eff0f0 0%, #f8fafc 100%);
            --glass-bg: rgba(98, 202, 220, 0.95);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated Background GV */
        body::before {
            content: "GV";
            position: fixed;
            font-size: clamp(100px, 30vw, 400px);
            font-weight: 900;
            color: rgba(30, 64, 175, 0.03);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 40px auto;
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
            /* Entry Animation */
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #1e293b;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        h3 {
            text-align: center;
            color: var(--accent);
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: #475569;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background: #fdfdfd;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: #fff;
        }

        /* Radio & Checkbox Styling */
        .radio-group {
            display: flex;
            gap: 15px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .radio-item input { width: auto; margin: 0; cursor: pointer; }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            font-size: 17px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(30, 64, 175, 0.3);
            opacity: 0.95;
        }

        button:active { transform: translateY(0); }

        .terms-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #64748b;
            margin: 20px 0;
        }

        .terms-box ul { padding-left: 20px; margin: 10px 0 0 0; }

        /* Thank You Animation */
        .thank-you {
            display: none;
            text-align: center;
            padding: 40px 20px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>

<body>

<div class="container" id="formBox">
    <h1>THE GRAND VILLAS</h1>
    <h3>Room Booking Portal</h3>

    <form onsubmit="submitForm(event)">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="customerName" required placeholder="John Doe">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" required placeholder="+91 ...">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required placeholder="john@example.com">
            </div>
        </div>

        <div class="form-group">
            <label>Permanent Address</label>
            <textarea rows="2" required placeholder="Street, City, State"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="gender" required> Male</label>
                    <label class="radio-item"><input type="radio" name="gender"> Female</label>
                </div>
            </div>
            <div class="form-group">
                <label>Room Type</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="room" required> Single</label>
                    <label class="radio-item"><input type="radio" name="room"> Double</label>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>ID Proof</label>
                <select required>
                    <option value="">Select ID</option>
                    <option>Aadhar Card</option>
                    <option>Passport</option>
                    <option>Driving License</option>
                </select>
            </div>
            <div class="form-group">
                <label>ID Number</label>
                <input type="text" required placeholder="ID Details">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Check-in</label>
                <input type="date" required>
            </div>
            <div class="form-group">
                <label>Check-out</label>
                <input type="date" required>
            </div>
        </div>

        <div class="terms-box">
            <strong>Terms & Conditions</strong>
            <ul>
                <li>Valid government ID is mandatory.</li>
                <li>Booking amount is non-refundable.</li>
                <li>Property damage will be charged.</li>
            </ul>
        </div>

        <div style="margin: 15px 0;">
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <input type="checkbox" required style="width: auto;">
                <span style="font-size: 0.85rem;">I agree to the terms and conditions</span>
            </label>
        </div>

        <button type="submit">Confirm My Booking</button>
    </form>
</div>

<div class="container thank-you" id="thankYouBox">
    <span class="success-icon">✨</span>
    <h2 style="color: #059669; margin-top: 0;">Booking Confirmed!</h2>
    <p id="confirmText" style="line-height: 1.6; color: #475569;"></p>
    <p>A confirmation email has been sent to your address.</p>
    <button onclick="location.reload()" style="background: #64748b; margin-top: 30px;">Back to Home</button>
</div>

<script>
    function submitForm(event) {
        event.preventDefault();

        const name = document.getElementById("customerName").value;
        const formBox = document.getElementById("formBox");
        const thankYouBox = document.getElementById("thankYouBox");

        // Simple exit animation
        formBox.style.transition = "all 0.5s ease";
        formBox.style.opacity = "0";
        formBox.style.transform = "translateY(-20px)";

        setTimeout(() => {
            formBox.style.display = "none";
            thankYouBox.style.display = "block";
            document.getElementById("confirmText").innerHTML =
                "Dear <b>" + name + "</b>, your luxury stay at <b>The Grand Villas</b> has been successfully reserved.";
        }, 500);
    }
</script>

</body>
</html>
