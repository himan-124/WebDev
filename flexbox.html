<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Parent Properties Demo</title>
    <style>
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #df9b9b;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #222;
            margin: 0;
        }
/*
        .container {
            background-color: #eaf6f6; 
            display: flex; 
            justify-content: space-evenly; 
            align-items: flex-start; 
            padding: 40px 20px;
            height: 400px; 
            width: 100%;
            gap: 20px;

        }*/
        .container {
    background-color: #eaf6f6; 
    display: flex; 
    flex-wrap: wrap; 
    justify-content: space-evenly; 
    align-items: flex-start; 
    padding: 40px 20px;
    width: 100%;
    gap: 20px;
}
        .box {
            background-color: #2e86c1; 
            width: 100px;
            height: 60px;
            color: white;
            font-size: 19px;
            font-weight: bold;
            padding: 19px; 
            display : flex;
            align-items: center;
            justify-content: center ;
        }
        #one{
            /*flex-basis: 200px;
            flex-grow: 2;
            flex-shrink: 2px;*/
        }
        #two{
           /* flex-grow: 3;*/
        }

        footer {
            background-color: #df9b9b; 
            flex-grow: 1; 
            min-height: 200px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Flexbox Parent Properties Demo</h1>
    </header>

    <div class="container">
        <div class="box" id = "one"> 1</div>
        <div class="box"  id = "two">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>

    <footer></footer>

</body>
</html>
