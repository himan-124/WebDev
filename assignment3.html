<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nav-bar</title>
    <style>
        nav{
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            background-color: black;
        }
        .centre{
            display: flex;
            gap: 20px;
        }
        a{
            color:rgb(229, 181, 37);
            font-size: 20px;
            font-weight: bold;
        }
        button{
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            background-color: white;
        }
    </style>
</head>
<body>
    <nav>
        <div class="start">
            <a href="#">Home</a>

        </div>
        <div class="centre">
            <a href="#">About</a>
            <a href="#">Menu</a>
            <a href="#">Contact us</a>
            <a href="#">5152696969</a>
            
        </div>
        <div class="end">
            <button>login</button>
        </div>
    </nav>
</body>
</html>
